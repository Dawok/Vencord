name: Sync Fork

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Git config
      run: |
        git config user.name "GitHub Action"
        git config user.email "actions@github.com"

    - name: Add upstream
      run: git remote add upstream https://github.com/Vendicated/Vencord.git

    - name: Rebase onto upstream
      run: |
        git fetch upstream
        git checkout main
        git rebase upstream/main

    - name: Push
      run: git push origin main --force-with-lease
